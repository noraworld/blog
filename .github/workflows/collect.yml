name: Collect Post Files

on:
  workflow_call:
    inputs:
      event_name:
        required: true
        type: string
      target_path:
        required: false
        default: ""
        type: string
    outputs:
      file_pairs_json:
        description: Changed or requested file pairs
        value: ${{ jobs.collect.outputs.file_pairs_json }}
      task_file_pairs_json:
        description: Newly added file pairs for task creation
        value: ${{ jobs.collect.outputs.task_file_pairs_json }}

jobs:
  collect:
    name: Collect changed files
    runs-on: ubuntu-latest
    outputs:
      file_pairs_json: ${{ steps.set-pairs.outputs.file_pairs_json }}
      task_file_pairs_json: ${{ steps.set-pairs.outputs.task_file_pairs_json }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: set-pairs
        run: |
          if [ "${{ inputs.event_name }}" = "workflow_dispatch" ]; then
            pairs=$(echo "${{ inputs.target_path }}" | tr ',' '\n' | xargs -n1 |
              (grep '^_posts/ja/.*\.md$' || true) |
              while read f; do
                out=$(echo "$f" | sed 's|^_posts/ja/|_posts/en/|')
                echo "{\"input\": \"$f\", \"output\": \"$out\"}"
              done | jq -s .)
            task_pairs="$pairs"
          else
            pairs=$(git diff --name-only --diff-filter=AM ${{ github.event.before }} ${{ github.sha }} |
              (grep '^_posts/ja/.*\.md$' || true) |
              while read f; do
                out=$(echo "$f" | sed 's|^_posts/ja/|_posts/en/|')
                echo "{\"input\": \"$f\", \"output\": \"$out\"}"
              done | jq -s .)
            task_pairs=$(git diff --name-only --diff-filter=A ${{ github.event.before }} ${{ github.sha }} |
              (grep '^_posts/ja/.*\.md$' || true) |
              while read f; do
                out=$(echo "$f" | sed 's|^_posts/ja/|_posts/en/|')
                echo "{\"input\": \"$f\", \"output\": \"$out\"}"
              done | jq -s .)
          fi

          echo "file_pairs_json<<EOF" >> "$GITHUB_OUTPUT"
          echo "$pairs" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "task_file_pairs_json<<EOF" >> "$GITHUB_OUTPUT"
          echo "$task_pairs" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
        shell: bash
