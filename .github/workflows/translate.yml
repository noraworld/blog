name: Translate Posts

on:
  workflow_call:
    inputs:
      file_pairs_json:
        required: true
        type: string

jobs:
  translate:
    name: Translate each post
    if: ${{ inputs.file_pairs_json != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix:
        pair: ${{ fromJson(inputs.file_pairs_json) }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Download updated note posts
        uses: actions/download-artifact@v4
        with:
          pattern: note-updated-*
          path: .
          merge-multiple: true

      - id: check-disabled
        name: Check translation flag
        run: |
          disabled="$(
          /usr/bin/python3 - <<'PYTHON'
          from pathlib import Path
          import os

          path = Path(os.environ["INPUT_PATH"])
          lines = path.read_text().splitlines()

          if not lines or lines[0] != "---":
              print("false")
              raise SystemExit(0)

          for line in lines[1:]:
              if line == "---":
                  break
              if line.strip() == "translation: false":
                  print("true")
                  raise SystemExit(0)

          print("false")
          PYTHON
          )"
          echo "disabled=$disabled" >> "$GITHUB_OUTPUT"
        shell: bash
        env:
          INPUT_PATH: ${{ matrix.pair.input }}

      - name: Read content from input file
        if: ${{ steps.check-disabled.outputs.disabled != 'true' }}
        run: |
          content=$(cat "${{ matrix.pair.input }}")
          echo "USER_PROMPT<<EOF" >> "$GITHUB_ENV"
          echo "$content" >> "$GITHUB_ENV"
          echo "EOF" >> "$GITHUB_ENV"
        shell: bash

      - name: Translate with ChatGPT
        if: ${{ steps.check-disabled.outputs.disabled != 'true' }}
        uses: noraworld/chatgpt-feedback@main
        with:
          model: gpt-4o
          system_prompt: |-
            これは日本語で書かれたブログ記事です。この記事の英語バージョンを作成してください。

            翻訳のルールに関しては次のルールに従ってください。
            1. あなたはアメリカのネイティブスピーカーです。イギリス英語ではなくアメリカ英語で書いてください。
            2. ネイティブの未成年でも理解できるような簡単な英語で書いてください。難しい単語を使用しないでください。
            3. 詩的・文学的・学術的で特殊な単語や表現は避けてください。原文に日本語独特のコロケーションが含まれていた場合は自然な英語になるよう意訳してください。

            フォーマットに関しては次のルールに従ってください。
            1. 先頭の --- で囲まれたメタデータに関しては title と description のみを英訳し、それ以外は改行も維持してそのまま出力してください。
            2. 本文が長くても途中で省略せず最後まで忠実に翻訳してください。
            3. 見出しや段落、表、引用などのマークダウンのフォーマットは原文に忠実に従ってください。
            4. 本文の中に、コードブロックで囲まれた部分、画像、URL が含まれる場合、それらはそのまま出力してください。
            5. レスポンスをそのままファイルに保存するため、「わかりました」などの返答は一切しないでください。
          user_prompt: ${{ env.USER_PROMPT }}
          output_file: ${{ matrix.pair.output }}
          trailing_newline: true
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          CHATGPT_API_KEY: ${{ secrets.CHATGPT_API_KEY }}

      - id: artifact-name
        if: ${{ steps.check-disabled.outputs.disabled != 'true' }}
        name: Build artifact name
        run: |
          name=$(
            /usr/bin/python3 - <<'PYTHON'
            import os
            import re

            path = os.environ["OUTPUT_PATH"]
            print("translated-post-" + re.sub(r"[^A-Za-z0-9._-]", "-", path))
            PYTHON
          )
          echo "name=$name" >> "$GITHUB_OUTPUT"
        shell: bash
        env:
          OUTPUT_PATH: ${{ matrix.pair.output }}

      - name: Upload translated post
        if: ${{ steps.check-disabled.outputs.disabled != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact-name.outputs.name }}
          path: ${{ matrix.pair.output }}
          if-no-files-found: error
          retention-days: 1
