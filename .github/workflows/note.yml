name: Post note

on:
  workflow_call:
    inputs:
      file_pairs_json:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      target_path:
        required: true
        description: Target full path (comma separated)
        type: string

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      file_pairs_json: ${{ steps.set-pairs.outputs.file_pairs_json }}
    steps:
      - id: set-pairs
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            pairs=$(echo "${{ github.event.inputs.target_path }}" | tr ',' '\n' | xargs -n1 |
              (grep '^_posts/ja/.*\.md$' || true) |
              while read f; do
                out=$(echo "$f" | sed 's|^_posts/ja/|_posts/en/|')
                echo "{\"input\": \"$f\", \"output\": \"$out\"}"
              done | jq -s .)
          else
            pairs='${{ inputs.file_pairs_json }}'
          fi

          echo "file_pairs_json<<EOF" >> "$GITHUB_OUTPUT"
          echo "$pairs" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
        shell: bash

  post:
    needs: prepare
    if: ${{ needs.prepare.outputs.file_pairs_json != '[]' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      max-parallel: 1
      matrix:
        pair: ${{ fromJson(needs.prepare.outputs.file_pairs_json) }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          # Full history is not strictly required here; this avoids shallow-clone edge cases
          # when we re-sync the worktree to the latest origin/main before pushing.
          fetch-depth: 0

      - name: Post to note
        uses: noraworld/github-to-note@main
        with:
          note_email: ${{ secrets.NOTE_EMAIL }}
          note_password: ${{ secrets.NOTE_PASSWORD }}
          content_file: ${{ matrix.pair.input }}
          write_note_id: "true"
        env:
          NOTE_COOKIE: ${{ secrets.NOTE_COOKIE }}
          NOTE_SESSION_V5: ${{ secrets.NOTE_SESSION_V5 }}
          XSRF_TOKEN: ${{ secrets.XSRF_TOKEN }}
          CSRF_TOKEN: ${{ secrets.CSRF_TOKEN }}

      - name: Mark note_published as true
        run: |
          /usr/bin/python3 - <<'PYTHON'
          from pathlib import Path

          path = Path(r"${{ matrix.pair.input }}")
          lines = path.read_text().splitlines()

          if not lines or lines[0] != '---':
              raise SystemExit(0)

          in_front_matter = True
          for i in range(1, len(lines)):
              if lines[i] == '---':
                  break
              if lines[i].strip() == 'note_published: false':
                  lines[i] = 'note_published: true'
                  path.write_text('\n'.join(lines) + '\n')
                  break
          PYTHON

      - name: Commit updated note_id
        run: |
          git config user.name "$(git --no-pager log --format=format:'%an' -n 1)"
          git config user.email "$(git --no-pager log --format=format:'%ae' -n 1)"
          filename=$(basename "${{ matrix.pair.input }}")
          input_path="${{ matrix.pair.input }}"
          temp_input=$(mktemp)
          cp "$input_path" "$temp_input"
          git fetch origin main
          git checkout -B main origin/main
          cp "$temp_input" "$input_path"
          git add "$input_path"
          git diff --cached --quiet && exit 0
          git commit -m "Update note_id for ${filename}"
          git push origin HEAD:main
