name: Post note

on:
  workflow_call:
    inputs:
      file_pairs_json:
        required: true
        type: string

jobs:
  post:
    if: ${{ inputs.file_pairs_json != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix:
        pair: ${{ fromJson(inputs.file_pairs_json) }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Post to note
        uses: noraworld/github-to-note@main
        with:
          note_email: ${{ secrets.NOTE_EMAIL }}
          note_password: ${{ secrets.NOTE_PASSWORD }}
          content_file: ${{ matrix.pair.input }}
          write_note_id: "true"
        env:
          NOTE_COOKIE: ${{ secrets.NOTE_COOKIE }}
          NOTE_SESSION_V5: ${{ secrets.NOTE_SESSION_V5 }}
          XSRF_TOKEN: ${{ secrets.XSRF_TOKEN }}
          CSRF_TOKEN: ${{ secrets.CSRF_TOKEN }}

      - name: Mark note_published as true
        run: |
          /usr/bin/python3 - <<'PYTHON'
          from pathlib import Path

          path = Path(r"${{ matrix.pair.input }}")
          lines = path.read_text().splitlines()

          if not lines or lines[0] != '---':
              raise SystemExit(0)

          in_front_matter = True
          for i in range(1, len(lines)):
              if lines[i] == '---':
                  break
              if lines[i].strip() == 'note_published: false':
                  lines[i] = 'note_published: true'
                  path.write_text('\n'.join(lines) + '\n')
                  break
          PYTHON

      - id: artifact-name
        name: Build artifact name
        run: |
          name=$(
            /usr/bin/python3 - <<'PYTHON'
            import os
            import re

            path = os.environ["INPUT_PATH"]
            print("note-updated-" + re.sub(r"[^A-Za-z0-9._-]", "-", path))
            PYTHON
          )
          echo "name=$name" >> "$GITHUB_OUTPUT"
        shell: bash
        env:
          INPUT_PATH: ${{ matrix.pair.input }}

      - name: Upload updated post
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact-name.outputs.name }}
          path: ${{ matrix.pair.input }}
          if-no-files-found: error
          retention-days: 1
